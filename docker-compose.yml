# ═══════════════════════════════════════════════════════════════════════════════
# Timer Service — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════

name: timer-service

x-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"


services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.3-alpine
    container_name: timer-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    logging: *json-logging
    restart: unless-stopped

  redis:
    image: redis:8.6-alpine
    container_name: timer-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    logging: *json-logging
    restart: unless-stopped

  # ── Application ────────────────────────────────────────────────────────────
  api:
    container_name: timer-api
    build: { context: ., target: runtime }
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    init: true
    logging: *json-logging
    restart: unless-stopped

  # Celery worker — scale with:  docker compose up --scale worker=4
  # No container_name — allows horizontal scaling.
  worker:
    build: { context: ., target: runtime }
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      celery -A src.worker.celery_app:celery_app
      worker --loglevel=info --concurrency=4
    # Docker default is 10 s. 60 s gives Celery warm-shutdown time
    # to finish in-flight webhook POSTs before SIGKILL.
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "celery", "-A", "src.worker.celery_app:celery_app",
             "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    init: true
    logging: *json-logging
    restart: unless-stopped

  # Celery beat — only ONE instance across the cluster.
  beat:
    container_name: timer-beat
    build: { context: ., target: runtime }
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      celery -A src.worker.celery_app:celery_app
      beat --loglevel=info
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    init: true
    logging: *json-logging
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
