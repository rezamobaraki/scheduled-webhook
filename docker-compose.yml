# ═══════════════════════════════════════════════════════════════════════════════
# Timer Service — Docker Compose (production-ready)
#
# Best practices applied:
#   • YAML anchors (x-) to DRY shared configuration
#   • Network isolation: backend (private) / frontend (api-only)
#   • Resource limits & reservations (prevent OOM / noisy-neighbour)
#   • Read-only root filesystem + tmpfs for writable scratch dirs
#   • Security: no-new-privileges, drop ALL capabilities
#   • Log rotation (json-file driver with size + count limits)
#   • stop_grace_period for Celery workers to finish in-flight tasks
#   • init: true for proper PID-1 signal handling / zombie reaping
#   • Healthchecks on every service
#   • Pinned image tags (no :latest)
# ═══════════════════════════════════════════════════════════════════════════════

name: timer_service

# ── Shared fragments (YAML anchors) ─────────────────────────────────────────
x-app-common: &app-common
  build:
    context: .
    target: runtime
  env_file: .env
  environment: &app-env
    POSTGRES_HOST: postgres
    REDIS_HOST: redis
  restart: unless-stopped
  init: true
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging: &json-logging
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  tmpfs:
    - /tmp:noexec,nosuid,size=64m

x-infra-healthcheck: &infra-depends
  postgres: { condition: service_healthy }
  redis:    { condition: service_healthy }


services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.3-alpine
    container_name: timer-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging: *json-logging
    restart: unless-stopped

  redis:
    image: redis:8.6-alpine
    container_name: timer-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - backend
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging: *json-logging
    restart: unless-stopped

  # ── Application ────────────────────────────────────────────────────────────
  api:
    <<: *app-common
    container_name: timer-api
    ports:
      - "8000:8000"
    networks:
      - frontend
      - backend
    depends_on:
      <<: *infra-depends
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  # Celery worker — scale with:  docker compose up --scale worker=4
  # NOTE: no container_name — allows horizontal scaling.
  # On both networks: backend (DB + Redis) and frontend (outbound webhooks).
  worker:
    <<: *app-common
    networks:
      - backend
      - frontend
    depends_on:
      <<: *infra-depends
    command: >
      celery -A src.worker.celery_app:celery_app
      worker --loglevel=info --concurrency=4
    # Give in-flight tasks time to finish before SIGKILL.
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "celery", "-A", "src.worker.celery_app:celery_app",
             "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  # Celery beat — periodic sweep for overdue timers (Layer 1 recovery).
  # Only ONE beat instance should run across the cluster.
  beat:
    <<: *app-common
    container_name: timer-beat
    networks:
      - backend
    depends_on:
      <<: *infra-depends
    command: >
      celery -A src.worker.celery_app:celery_app
      beat --loglevel=info
    stop_grace_period: 15s
    # Beat is a scheduler, not a worker — "inspect ping" would check workers.
    # Instead verify the beat process itself is alive.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true    # no outbound internet — only inter-container traffic

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
