services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.3-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application ────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override hosts to use container hostnames inside Docker network.
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"

  # Celery worker — scale with:  docker compose up --scale worker=4
  worker:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      uv run celery -A src.worker.celery_app:celery_app
      worker --loglevel=info --concurrency=4

  # Celery beat — periodic sweep for overdue timers (Layer 1 recovery).
  # Only ONE beat instance should run across the cluster.
  beat:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      uv run celery -A src.worker.celery_app:celery_app
      beat --loglevel=info

volumes:
  pgdata:

